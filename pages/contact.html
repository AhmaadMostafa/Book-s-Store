<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact US</title>
    <link rel="icon" type="image/png" href="../images/images.png">
    <link rel="stylesheet" href="../css/about.css">

</head>
<body>
    <section class="hero1">
        <div class="heading"><h1>Contact</h1></div>
          <form method="post" class="container">
            <input type="text" placeholder="Name" name="full-name" width="120px" height="120px" class="name" required="required">
            <input type="text" placeholder="Phone" name="Phone-number" class="phone" required="required">

            <input type="text" placeholder="Message" name="Message" class="Message" required="required">
            <input type="submit" value="Contact US" class="cta-button" id="btn">

          </form>
        </div>
      </section>
